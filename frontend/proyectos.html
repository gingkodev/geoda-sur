<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CARDINAL SUR — Proyectos</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body class="h-screen overflow-hidden" style="background:#f5f3ef">
  <!-- Fixed project list + nav (desktop) -->
  <div id="sidebar" class="fixed right-0 top-0 bottom-0 w-56 z-[100] flex flex-col items-start pt-10 px-8 max-md:hidden" style="display:none">
    <a href="/" id="sidebar-home" class="text-[10px] tracking-wider uppercase no-underline text-cream mb-6 nav-link px-1 py-0.5">Inicio</a>
    <nav id="project-list" class="flex flex-col items-start gap-0.5"></nav>
  </div>

  <!-- Mobile nav — commented out, using fixed overlay instead -->
  <!-- <div id="nav" class="hidden max-md:block max-md:w-full max-md:bg-cream max-md:z-50"></div> -->

  <!-- Mobile: fixed project nav overlay (top-right, over hero image) -->
  <div id="mobile-project-nav" class="flex md:hidden fixed right-0 top-0 z-[150] flex-col items-end pt-6 pr-5 pl-8 pb-4 gap-0.5 bg-ink/60" style="display:none">
    <a href="/" id="mobile-home" class="text-[10px] tracking-wider uppercase no-underline text-cream px-1 py-0.5 mb-4">Inicio</a>
    <nav id="mobile-project-list" class="flex flex-col items-end gap-0.5"></nav>
  </div>

  <main id="projects-container" class="h-screen overflow-y-scroll" style="scroll-snap-type: y mandatory; display: none;">
    <p id="projects-empty" class="hidden text-center text-muted text-xs py-12">No projects yet</p>
  </main>

  <!-- Mute button (fixed, bottom-left) -->
  <button id="mute-btn" style="display:none" class="fixed bottom-5 left-5 z-[200] text-[10px] tracking-wider uppercase text-cream bg-ink/60 px-3 py-1.5 border border-cream/30 hover:bg-ink/80 transition-colors max-md:bottom-3 max-md:left-3"></button>

  <!-- Hidden audio element for playback -->
  <audio id="project-audio" preload="none"></audio>

  <script type="module" src="/src/proyectos/main.ts"></script>
</body>
</html>
