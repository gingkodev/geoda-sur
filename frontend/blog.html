<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" href="/favicon.ico">
  <title>CARDINAL SUR — Blog</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
</head>
<body class="overflow-hidden max-md:overflow-auto" style="background:#f5f3ef">
  <div id="nav" style="visibility:hidden" class="fixed right-10 top-1/2 -translate-y-1/2 z-[1000] max-md:static max-md:translate-y-0 max-md:top-0 max-md:right-0 max-md:w-full max-md:bg-cream max-md:z-50"></div>

  <!-- Desktop: pannable viewport with doodle canvas -->
  <div id="viewport" class="fixed inset-0 z-[1] overflow-hidden max-md:hidden" style="display: none;">
    <div id="world" class="absolute top-1/2 left-1/2 w-0 h-0 will-change-transform"></div>
  </div>

  <a href="/" id="compass" style="visibility:hidden" class="fixed top-8 right-12 w-[80px] h-[80px] z-[1000] max-md:hidden">
    <img src="/logo-cardinal.webp" alt="Cardinal Sur" class="w-full h-full" />
  </a>

  <div id="coords-display" class="fixed bottom-5 right-10 text-[10px] tracking-wider z-[1000] pointer-events-none opacity-70 max-md:hidden"></div>

  <!-- Mobile: vertical card stack -->
  <div id="mobile-blog" class="px-4 py-4" style="display: none;">
    <div id="mobile-blog-cards" class="flex flex-col gap-4"></div>
    <p id="mobile-blog-empty" class="hidden text-center text-muted text-xs py-12">No blog entries yet</p>
  </div>

  <script type="module" src="/src/blog/main.ts"></script>
</body>
</html>
